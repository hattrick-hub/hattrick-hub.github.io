      - "Lateral 10"
      - "Pases 8"

  - id: "mf"
    icono: "⚙️"
    nombre: "Mediocentro"
    principal: "Jugadas 15"
    secundarias:
      - "Defensa 6"
      - "Pases 6"
      - "Anotación 6"

  - id: "wm"
    icono: "⚙️"
    nombre: "Mediocentro hacia Lateral"
    principal: "Jugadas 14"
    secundarias:
      - "Lateral 8"
      - "Defensa 6"
      - "Pases 6"

  - id: "wi1"
    icono: "🏃"
    nombre: "Extremo hacia Medio"
    principal: "Lateral 13"
    secundarias:
      - "Jugadas 12"
      - "Pases 8"
      - "Defensa 6"

  - id: "wi2"
