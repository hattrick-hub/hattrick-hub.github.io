# ============================================================
# GLOSARIO HATTRICK
# ============================================================
glosario:
  - emoji: "🧤"
    term: "Portería"
    sub: "Keeper"
    filter: "portero"

  - emoji: "🛡️"
    term: "Defensa"
    sub: "Defending"
    filter: "defensa"

  - emoji: "⚙️"
    term: "Jugadas"
    sub: "Playmaking"
    filter: "jugadas"

  - emoji: "🏃"
    term: "Lateral"
    sub: "Winger"
    filter: "lateral"

  - emoji: "🎯"
    term: "Pases"
    sub: "Passing"
    filter: "pases"

  - emoji: "⚽"
    term: "Anotación"
    sub: "Scoring"
    filter: "anotación"

  - emoji: "🚩"
    term: "Balón Parado"
    sub: "Set Pieces"
    filter: "balón"

# ============================================================
# REQUISITOS RECOMENDADOS
# ============================================================
requisitos:
  - term: "Entrenador"
    sub: "Bueno (nivel 7) o Excelente (nivel 8)"

  - term: "Asistentes"
    sub: "Nivel 10 (ideal y perfecto)"

  - term: "Médico"
    sub: "Nivel 5 (prevención de lesiones)"

# ============================================================
# NOTAS IMPORTANTES
# Cada nota es una tarjeta scrolleable dentro del acordeón
# ============================================================
notas:
  - numero: 1
    titulo: "Flexibilidad en la Fase 2"
    contenido: "El orden de las habilidades secundarias no es estricto. Puedes entrenarlas en el orden que mejor se adapte al calendario o a las necesidades de tu equipo. Lo importante es completar los niveles sugeridos antes de pasar a la Fase 3."

  - numero: 2
    titulo: "¿Qué pasa si los niveles ya son diferentes?"
    contenido: "Si al revisar el Hattrick Portal notas que a tu jugador solo le falta 1 nivel (o un subnivel) para alcanzar la meta de alguna habilidad, eso se completará muy rápido. Si ya sobrepasó el nivel sugerido, puedes saltarte esa parte directamente."

  - numero: 3
    titulo: "Abierto a sugerencias"
    contenido: "Este plan está diseñado para optimizar al jugador para jugar con la selección. Si tienes dudas, comentarios o te gustaría adaptar el entrenamiento a otro estilo que te beneficie más en tu club, escríbeme con total confianza. Podemos revisarlo y organizarlo juntos para que ambos nos beneficiemos."

# ============================================================
# RESUMEN DE METAS
# Cada posición con su habilidad principal y secundarias
# ============================================================
resumen:
